<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	

	<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css">
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.16.0/umd/popper.min.js"></script>
	<script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.0/js/bootstrap.min.js"></script>
	
	<link rel="stylesheet" th:href="@{/css/admin-home.css}">

	
    <title>Admin Home</title>
</head>
<body>
	
	
	<nav id="nav" class="navbar navbar-expand-sm">
	        <div class="navbar-brand">
	          <h4>Welcome Admin</h4>
	        </div>

	        <button
	          class="navbar-toggler"
	          type="button"
	          onClick={toggleMenu}
	          aria-controls="navbarNav"
	          aria-expanded={isOpen}
	          aria-label="Toggle navigation"
			  style="background: transparent; border: none; padding: 0;"
	        >
	          /*White hamburger icon */
	          <svg
	            xmlns="http://www.w3.org/2000/svg"
	            width="20"
	            height="20"
	            viewBox="0 0 24 24"
	            fill="white"
	          >
	            <rect y="4" width="24" height="2" />
	            <rect y="11" width="24" height="2" />
	            <rect y="18" width="24" height="2" />
	          </svg>
	        </button>

			<div class="collapse navbar-collapse mr-auto show" id="navbarNav">

	          <ul class="navbar-nav ml-auto">
	            <li class="nav-item">
	             <a th:href="@{/admin/home}" style="color: white; text-decoration: none;">Home</a>
	            </li>
	            &nbsp;&nbsp;&nbsp;&nbsp;
	            <li className="nav-item">
	              <a th:href="@{/admin/recipes}" style="color: white; text-decoration: none;">Recipes</a>
	            </li>
	            &nbsp;&nbsp;&nbsp;&nbsp;
	            
	            <li className="nav-item">
                   <a th:href="@{/admin/report}" style="color: white; text-decoration: none;">Report</a>
	            </li>
	            &nbsp;&nbsp;&nbsp;&nbsp;
	            <li className="nav-item">
	              <a th:href="@{/admin/logout}" style="color: white; text-decoration: none;">Logout</a>
	            </li>
	          </ul>
	        </div>
	      </nav>
	<br><div class="container">
    
   <center>
	<h3 style="color: rgb(225,0,0);"><b>User List</b></h3>
   </center><br><br>
    
	
	<div class="table-responsive">
    <table class=" table-bordered table-hover">
		
		<thead>
        <tr>
            <th>ID</th>
            <th>Email</th>
            <th>Full Name</th>
            <th>Action</th>
        </tr>
		</thead>
		
		<tbody>
        <tr th:each="user : ${users}">
            <td th:text="${user.id}">1</td>
            <td th:text="${user.email}">user@example.com</td>
            <td th:text="${user.fullname}">Full Name</td>
            <td>
                <button class="tablebutton" ><a class="linkcolor"  th:if="${!user['isBlock']}" th:href="@{/admin/block/{id}(id=${user.id})}">Block</a>
                <a class="linkcolor"  th:if="${user['isBlock']}" th:href="@{/admin/unblock/{id}(id=${user.id})}">Unblock</a></button>
            </td>
        </tr>
		</tbody>
    </table>
	</div>
	
	</div>
	
</body>
</html>
