<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin Login</title>
    <link rel="stylesheet" href="/css/admin-login.css" />
</head>
<body>
    <div class="login-container">
        <h1>Admin Login</h1>
        <form th:action="@{/admin/login}" method="post" class="login-form">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="Enter your email" required />

            <label for="password">Password:</label>
            <input type="password" id="password" name="password" placeholder="Enter your password" required />

            <button type="submit" class="btn back">Login</button>
        </form>

        <div class="message error" th:if="${error}" th:text="${error}"></div>
        <div class="message success" th:if="${message}" th:text="${message}"></div>
    </div>
</body>
</html>
