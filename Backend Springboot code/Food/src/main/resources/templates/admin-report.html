<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Recipes Report</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css" />
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.16.0/umd/popper.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.0/js/bootstrap.min.js"></script>
    <link rel="stylesheet" th:href="@{/css/admin-report.css}" />
</head>
<body>

<nav id="nav" class="navbar navbar-expand-sm">
    <div class="navbar-brand">
        <h4>Welcome Admin <span th:text="${admin.fullname}">Full Name</span></h4>
    </div>
    <button
        class="navbar-toggler"
        type="button"
        data-toggle="collapse"
        data-target="#navbarNav"
        aria-controls="navbarNav"
        aria-expanded="false"
        aria-label="Toggle navigation"
        style="background: transparent; border: none; padding: 0;"
    >
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="white">
            <rect y="4" width="24" height="2" />
            <rect y="11" width="24" height="2" />
            <rect y="18" width="24" height="2" />
        </svg>
    </button>

    <div class="collapse navbar-collapse mr-auto" id="navbarNav">
        <ul class="navbar-nav ml-auto">
            <li class="nav-item"><a th:href="@{/admin/home}" style="color: white; text-decoration: none;">Home</a></li>
            <li class="nav-item">&nbsp;&nbsp;&nbsp;&nbsp;</li>
            <li class="nav-item"><a th:href="@{/admin/recipes}" style="color: white; text-decoration: none;">Recipes</a></li>
            <li class="nav-item">&nbsp;&nbsp;&nbsp;&nbsp;</li>
            <li class="nav-item"><a th:href="@{/admin/report}" style="color: white; text-decoration: none;">Report</a></li>
            <li class="nav-item">&nbsp;&nbsp;&nbsp;&nbsp;</li>
            <li class="nav-item"><a th:href="@{/admin/logout}" style="color: white; text-decoration: none;">Logout</a></li>
        </ul>
    </div>
</nav>

<br>

<div class="container">
    <center><h3 style="color: rgb(225,0,0);"><b>Recipes Report</b></h3></center><br><br>
    <div class="table-responsive">
        <table class="table table-bordered table-hover">
            <thead>
                <tr style="background-color: red; color: white;">
                    <th>No.</th>
                    <th>Created By</th>
                    <th>Recipes Created</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="user, iterStat : ${uniqueUsers}">
                    <td th:text="${iterStat.index + 1}">1</td>
                    <td th:text="${user.fullname}">Author Name</td>
                    <td th:text="${userRecipeCount[user.email]} ?: 0">0</td>
                    <td>
                        <b>
                            <span th:text="${user.isBlock} ? 'Blocked' : 'Active'"
                                  th:style="${user.isBlock} ? 'color: red; margin-left: 10px;' : 'color: green; margin-left: 10px;'">
                                Status
                            </span>
                        </b>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <div style="margin-top: 20px;">
        <a th:href="@{/admin/home}" class="btn back">Back to Admin Home</a>
    </div>
</div>

</body>
</html>
